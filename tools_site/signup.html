<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Tools Paradise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="aurora-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">Tools <span>Paradise</span></a>
      <h1>Create account</h1>
      <p class="auth-subtitle">Join free — no credit card needed.</p>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>

      <button class="auth-btn" id="signupBtn" onclick="handleSignup()">Create Account</button>

      <div id="authMessage" class="auth-message"></div>

      <div class="auth-divider">or</div>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in →</a>
      </div>
    </div>
  </div>

  <!-- CDN first, then our shared client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    const saved = localStorage.getItem('tp-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);

    const msg = document.getElementById('authMessage');
    const btn = document.getElementById('signupBtn');

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = 'auth-message ' + type;
    }

    async function handleSignup() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }
      if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';
      msg.className = 'auth-message';

      const { data, error } = await tpClient.auth.signUp({ email, password });

      if (error) {
        showMessage('❌ ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      } else if (data.user?.identities?.length === 0) {
        showMessage('⚠️ An account with this email already exists. Try signing in.', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      } else {
        showMessage('✓ Account created! Please check your email to confirm.', 'success');
        btn.textContent = 'Account Created';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignup();
    });
  </script>
</body>
</html>
